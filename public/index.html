<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>TermBeam</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        width: 100%;
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      .header {
        padding: 20px 16px 12px;
        text-align: center;
        border-bottom: 1px solid #0f3460;
      }
      .header h1 {
        font-size: 22px;
        font-weight: 700;
      }
      .header h1 span {
        color: #533483;
      }
      .header p {
        font-size: 13px;
        color: #888;
        margin-top: 4px;
      }

      .sessions-list {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .session-card {
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        text-decoration: none;
        color: inherit;
        transition: transform 0.2s ease;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        position: relative;
        z-index: 1;
      }
      .session-card:hover {
        border-color: #533483;
      }

      .swipe-wrap {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
      }
      .swipe-delete {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 80px;
        background: #e74c3c;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 0 12px 12px 0;
        z-index: 0;
      }
      .swipe-delete button {
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        flex-direction: column;
      }
      .swipe-delete button span {
        font-size: 11px;
        font-weight: 600;
      }

      .session-card .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .session-card .name {
        font-size: 17px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .session-card .name .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #2ecc71;
        flex-shrink: 0;
      }
      .session-card .pid {
        font-size: 12px;
        color: #888;
        background: #1a1a2e;
        padding: 2px 8px;
        border-radius: 4px;
      }
      .session-card .details {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 16px;
        font-size: 13px;
        color: #aaa;
      }
      .session-card .details span {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .session-card .connect-btn {
        align-self: flex-end;
        background: #533483;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 8px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .session-card .connect-btn:active {
        background: #6a42a8;
      }

      .new-session {
        margin: 0 16px;
        padding: 14px;
        background: transparent;
        border: 2px dashed #0f3460;
        border-radius: 12px;
        color: #888;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .new-session:active {
        border-color: #533483;
        color: #e0e0e0;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #666;
        font-size: 15px;
      }

      /* New session modal */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 100;
        justify-content: center;
        align-items: center;
      }
      .modal-overlay.visible {
        display: flex;
      }
      .modal {
        background: #16213e;
        border-radius: 16px;
        width: 90%;
        max-width: 500px;
        padding: 24px 20px;
      }
      .modal h2 {
        font-size: 18px;
        margin-bottom: 16px;
      }
      .modal label {
        display: block;
        font-size: 13px;
        color: #aaa;
        margin-bottom: 4px;
        margin-top: 12px;
      }
      .modal input,
      .modal select {
        width: 100%;
        padding: 10px 12px;
        background: #1a1a2e;
        border: 1px solid #0f3460;
        border-radius: 8px;
        color: #e0e0e0;
        font-size: 15px;
        outline: none;
      }
      .modal input:focus {
        border-color: #533483;
      }
      .modal-actions {
        display: flex;
        gap: 12px;
        margin-top: 20px;
      }
      .modal-actions button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-cancel {
        background: #0f3460;
        color: #e0e0e0;
      }
      .btn-create {
        background: #533483;
        color: white;
      }

      /* Folder browser */
      .cwd-picker {
        display: flex;
        gap: 8px;
      }
      .cwd-picker input {
        flex: 1;
      }
      .cwd-browse-btn {
        background: #0f3460;
        color: #e0e0e0;
        border: 1px solid #0f3460;
        border-radius: 8px;
        padding: 0 14px;
        font-size: 18px;
        cursor: pointer;
        flex-shrink: 0;
        display: flex;
        align-items: center;
      }
      .cwd-browse-btn:active {
        background: #533483;
      }

      .browser-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        z-index: 200;
        justify-content: center;
        align-items: flex-end;
      }
      .browser-overlay.visible {
        display: flex;
      }
      .browser-sheet {
        background: #16213e;
        border-radius: 16px 16px 0 0;
        width: 100%;
        max-width: 500px;
        height: 80vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .browser-header {
        padding: 16px 16px 12px;
        border-bottom: 1px solid #0f3460;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .browser-header h3 {
        font-size: 17px;
        font-weight: 600;
      }
      .browser-close {
        background: none;
        border: none;
        color: #888;
        font-size: 24px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
      }
      .browser-close:active {
        color: #e0e0e0;
      }

      .browser-breadcrumb {
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 2px;
        font-size: 13px;
        overflow-x: auto;
        white-space: nowrap;
        border-bottom: 1px solid #0f3460;
        flex-shrink: 0;
        -webkit-overflow-scrolling: touch;
      }
      .crumb {
        background: none;
        border: none;
        color: #888;
        font-size: 13px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .crumb:active,
      .crumb:hover {
        background: #0f3460;
        color: #e0e0e0;
      }
      .crumb.current {
        color: #e0e0e0;
        font-weight: 600;
      }
      .crumb-sep {
        color: #444;
        flex-shrink: 0;
      }

      .browser-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0;
        -webkit-overflow-scrolling: touch;
      }
      .browser-empty {
        text-align: center;
        padding: 40px 20px;
        color: #666;
        font-size: 14px;
      }
      .folder-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        cursor: pointer;
        border-bottom: 1px solid rgba(15, 52, 96, 0.5);
        transition: background 0.1s;
        -webkit-tap-highlight-color: transparent;
      }
      .folder-item:active {
        background: rgba(83, 52, 131, 0.3);
      }
      .folder-item:hover {
        background: rgba(83, 52, 131, 0.15);
      }
      .folder-icon {
        font-size: 22px;
        flex-shrink: 0;
        width: 28px;
        text-align: center;
      }
      .folder-name {
        font-size: 15px;
        color: #e0e0e0;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .folder-arrow {
        color: #444;
        font-size: 18px;
        flex-shrink: 0;
      }

      .browser-footer {
        padding: 12px 16px calc(env(safe-area-inset-bottom, 8px) + 8px);
        border-top: 1px solid #0f3460;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .browser-current-path {
        font-size: 12px;
        color: #888;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .browser-select-btn {
        width: 100%;
        padding: 12px;
        background: #533483;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .browser-select-btn:active {
        background: #6a42a8;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>📡 Term<span>Cast</span></h1>
      <p>Beam your terminal to any device · <span id="version" style="color: #533483"></span></p>
    </div>

    <div class="sessions-list" id="sessions-list"></div>
    <button class="new-session" id="new-session-btn">+ New Session</button>

    <div class="modal-overlay" id="modal">
      <div class="modal">
        <h2>New Session</h2>
        <label for="sess-name">Name</label>
        <input type="text" id="sess-name" placeholder="My Session" />
        <label for="sess-shell">Shell / Command</label>
        <input type="text" id="sess-shell" placeholder="/bin/zsh" />
        <label for="sess-cwd">Working Directory</label>
        <div class="cwd-picker">
          <input type="text" id="sess-cwd" placeholder="/Users/dorlugasigal" />
          <button type="button" class="cwd-browse-btn" id="browse-btn" title="Browse folders">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
              />
            </svg>
          </button>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" id="modal-cancel">Cancel</button>
          <button class="btn-create" id="modal-create">Create</button>
        </div>
      </div>
    </div>

    <!-- Folder browser -->
    <div class="browser-overlay" id="browser-overlay">
      <div class="browser-sheet">
        <div class="browser-header">
          <h3>
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="vertical-align: -3px; margin-right: 6px"
            >
              <path
                d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
              /></svg
            >Choose Folder
          </h3>
          <button class="browser-close" id="browser-close">×</button>
        </div>
        <div class="browser-breadcrumb" id="browser-breadcrumb"></div>
        <div class="browser-list" id="browser-list"></div>
        <div class="browser-footer">
          <div class="browser-current-path" id="browser-path">/</div>
          <button class="browser-select-btn" id="browser-select">Select This Folder</button>
        </div>
      </div>
    </div>

    <script>
      const listEl = document.getElementById('sessions-list');
      const modal = document.getElementById('modal');

      async function loadSessions() {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();

        if (sessions.length === 0) {
          listEl.innerHTML = '<div class="empty-state">No active sessions</div>';
          return;
        }

        listEl.innerHTML = sessions
          .map(
            (s) => `
        <div class="swipe-wrap" data-session-id="${s.id}">
          <div class="swipe-delete">
            <button onclick="deleteSession('${s.id}', event)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg><span>Delete</span></button>
          </div>
          <div class="session-card" onclick="location.href='/terminal?id=${s.id}'">
            <div class="top">
              <div class="name"><span class="dot"></span>${esc(s.name)}</div>
              <span class="pid">PID ${s.pid}</span>
            </div>
            <div class="details">
              <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> ${esc(s.cwd)}</span>
              <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg> ${esc(s.shell)}</span>
              <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> ${s.clients} connected</span>
            </div>
            <button class="connect-btn">Connect →</button>
          </div>
        </div>
      `,
          )
          .join('');

        // Attach swipe handlers after rendering
        listEl.querySelectorAll('.swipe-wrap').forEach(initSwipe);
      }

      function esc(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      document.getElementById('new-session-btn').addEventListener('click', () => {
        modal.classList.add('visible');
      });
      document.getElementById('modal-cancel').addEventListener('click', () => {
        modal.classList.remove('visible');
      });
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('visible');
      });

      document.getElementById('modal-create').addEventListener('click', async () => {
        const name = document.getElementById('sess-name').value.trim();
        const shell = document.getElementById('sess-shell').value.trim();
        const cwd = document.getElementById('sess-cwd').value.trim();

        const body = {};
        if (name) body.name = name;
        if (shell) body.shell = shell;
        if (cwd) body.cwd = cwd;

        const res = await fetch('/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        location.href = data.url;
      });

      // --- Swipe to delete ---
      async function deleteSession(id, e) {
        e.stopPropagation();
        const wrap = document.querySelector(`.swipe-wrap[data-session-id="${id}"]`);
        try {
          await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
          if (wrap) {
            wrap.style.transition = 'opacity 0.25s, max-height 0.3s ease 0.1s';
            wrap.style.opacity = '0';
            wrap.style.maxHeight = wrap.offsetHeight + 'px';
            requestAnimationFrame(() => {
              wrap.style.maxHeight = '0';
              wrap.style.overflow = 'hidden';
            });
            setTimeout(() => loadSessions(), 350);
          } else {
            loadSessions();
          }
        } catch {
          loadSessions();
        }
      }

      function initSwipe(wrap) {
        const card = wrap.querySelector('.session-card');
        const THRESHOLD = 70;
        let startX = 0,
          currentX = 0,
          swiping = false,
          swiped = false;

        wrap.addEventListener(
          'touchstart',
          (e) => {
            startX = e.touches[0].clientX;
            currentX = 0;
            swiping = true;
            card.style.transition = 'none';
          },
          { passive: true },
        );

        wrap.addEventListener(
          'touchmove',
          (e) => {
            if (!swiping) return;
            const dx = e.touches[0].clientX - startX;
            currentX = Math.min(0, Math.max(-THRESHOLD, dx));
            card.style.transform = `translateX(${currentX}px)`;
          },
          { passive: true },
        );

        wrap.addEventListener('touchend', () => {
          swiping = false;
          card.style.transition = 'transform 0.2s ease';
          if (currentX < -THRESHOLD / 2) {
            card.style.transform = `translateX(-${THRESHOLD}px)`;
            swiped = true;
          } else {
            card.style.transform = 'translateX(0)';
            swiped = false;
          }
        });

        // Tap elsewhere to close
        document.addEventListener(
          'touchstart',
          (e) => {
            if (swiped && !wrap.contains(e.target)) {
              card.style.transition = 'transform 0.2s ease';
              card.style.transform = 'translateX(0)';
              swiped = false;
            }
          },
          { passive: true },
        );

        // Block card click when swiped open
        card.addEventListener(
          'click',
          (e) => {
            if (swiped) {
              e.preventDefault();
              e.stopPropagation();
            }
          },
          true,
        );
      }

      // --- Folder Browser ---
      const cwdInput = document.getElementById('sess-cwd');
      const browserOverlay = document.getElementById('browser-overlay');
      const browserList = document.getElementById('browser-list');
      const browserBreadcrumb = document.getElementById('browser-breadcrumb');
      const browserPath = document.getElementById('browser-path');
      let currentBrowsePath = '/';

      document.getElementById('browse-btn').addEventListener('click', () => {
        const initial = cwdInput.value.trim() || '/';
        navigateTo(initial);
        browserOverlay.classList.add('visible');
      });

      document.getElementById('browser-close').addEventListener('click', () => {
        browserOverlay.classList.remove('visible');
      });
      browserOverlay.addEventListener('click', (e) => {
        if (e.target === browserOverlay) browserOverlay.classList.remove('visible');
      });

      document.getElementById('browser-select').addEventListener('click', () => {
        cwdInput.value = currentBrowsePath;
        browserOverlay.classList.remove('visible');
      });

      async function navigateTo(dir) {
        currentBrowsePath = dir;
        browserPath.textContent = dir;
        renderBreadcrumb(dir);
        browserList.innerHTML = '<div class="browser-empty">Loading…</div>';

        try {
          const res = await fetch(`/api/dirs?q=${encodeURIComponent(dir + '/')}`);
          const data = await res.json();
          if (!data.dirs.length) {
            browserList.innerHTML = '<div class="browser-empty">No subfolders</div>';
            return;
          }
          browserList.innerHTML = data.dirs
            .map((d) => {
              const name = d.split('/').pop();
              return `<div class="folder-item" data-path="${esc(d)}">
            <span class="folder-icon">📁</span>
            <span class="folder-name">${esc(name)}</span>
            <span class="folder-arrow">›</span>
          </div>`;
            })
            .join('');

          browserList.querySelectorAll('.folder-item').forEach((el) => {
            el.addEventListener('click', () => navigateTo(el.dataset.path));
          });
          browserList.scrollTop = 0;
        } catch {
          browserList.innerHTML = '<div class="browser-empty">Error loading folders</div>';
        }
      }

      function renderBreadcrumb(dir) {
        const parts = dir.split('/').filter(Boolean);
        let html = `<button class="crumb" data-path="/">/</button>`;
        let accumulated = '';
        parts.forEach((part, i) => {
          accumulated += '/' + part;
          const isCurrent = i === parts.length - 1;
          html += `<span class="crumb-sep">›</span>`;
          html += `<button class="crumb${isCurrent ? ' current' : ''}" data-path="${esc(accumulated)}">${esc(part)}</button>`;
        });
        browserBreadcrumb.innerHTML = html;
        browserBreadcrumb.querySelectorAll('.crumb').forEach((el) => {
          el.addEventListener('click', () => navigateTo(el.dataset.path));
        });
        // Scroll breadcrumb to end
        browserBreadcrumb.scrollLeft = browserBreadcrumb.scrollWidth;
      }

      // Fetch version
      fetch('/api/version')
        .then((r) => r.json())
        .then((d) => {
          document.getElementById('version').textContent = 'v' + d.version;
        })
        .catch(() => {});

      loadSessions();
      setInterval(loadSessions, 3000);
    </script>
  </body>
</html>
