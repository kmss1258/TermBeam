name: Bug Report
description: Report a bug or unexpected behavior
title: '[Bug]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Start TermBeam with '...'
        2. Open the browser and '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Windows (native)
        - Other
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: 'Run node --version'
      placeholder: 'v22.0.0'
    validations:
      required: true

  - type: input
    id: termbeam-version
    attributes:
      label: TermBeam Version
      description: 'Run termbeam --version or check the UI header'
      placeholder: '1.0.0'
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser (if UI-related)
      options:
        - Chrome (mobile)
        - Safari (mobile)
        - Firefox (mobile)
        - Chrome (desktop)
        - Safari (desktop)
        - Firefox (desktop)
        - Other
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant server or browser console logs.
      render: shell
    validations:
      required: false
